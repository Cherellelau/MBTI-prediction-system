{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:520px;margin:0 auto;">
    <h1>Reset Password</h1>
    <p class="muted">Account: <b>{{ email }}</b></p>

    <form method="POST">
        <label style="display:block;margin-top:12px;">New Password (6–8 chars)</label>
        <input type="password" name="new_password" required
            style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;">

        <label style="display:block;margin-top:12px;">Confirm Password</label>
        <input type="password" name="confirm_password" required
            style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;">

        <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
            <button type="submit" class="btn">Reset</button>
            <a class="btn secondary" href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </form>
</div>

{% endblock %}
