{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width: 760px; margin: 24px auto;">
    <h1>{{ t("resume_upload_title") }}</h1>
    <p style="color:#6b7280; margin-bottom: 20px;">
        {{ t("resume_upload_subtitle") }}
    </p>

    <div
        style="margin-bottom:18px; padding:14px 16px; border:1px solid #dbeafe; background:#eff6ff; border-radius:12px;">
        <div style="font-weight:700; margin-bottom:8px;">{{ t("resume_upload_guideline_title") }}</div>
        <div style="color:#374151; line-height:1.6;">
            {{ t("resume_upload_guideline_text") }}
        </div>
    </div>

    <form method="POST" action="{{ url_for('profile.upload_resume_post') }}" enctype="multipart/form-data">
        <div>
            <label for="resume_file" style="display:block; margin-bottom:8px; font-weight:600;">
                {{ t("resume_upload_label") }}
            </label>

            <div
                style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:14px 16px; border:1px solid #d1d5db; border-radius:16px; background:#fff;">
                <label for="resume_file"
                    style="display:inline-block; background:#4f78ff; color:#fff; padding:10px 18px; border-radius:12px; font-weight:600; cursor:pointer; text-decoration:none;">
                    {{ t("choose_file") }}
                </label>

                <span id="resumeFileName" style="color:#6b7280; font-size:0.95rem;">
                    {{ t("no_file_chosen") }}
                </span>

                <input type="file" name="resume" id="resume_file" accept=".pdf,.png,.jpg,.jpeg" required hidden>
            </div>
        </div>

        <div style="margin-top: 20px; display:flex; gap:12px; flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary">
                {{ t("resume_upload_button") }}
            </button>

            <a href="{{ url_for('profile.profile_onboarding') }}" class="btn btn-ghost" style="text-decoration:none;">
                {{ t("back_button") }}
            </a>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const fileInput = document.getElementById("resume_file");
        const fileNameText = document.getElementById("resumeFileName");

        if (fileInput && fileNameText) {
            fileInput.addEventListener("change", function () {
                if (fileInput.files && fileInput.files.length > 0) {
                    fileNameText.textContent = fileInput.files[0].name;
                } else {
                    fileNameText.textContent = "{{ t('no_file_chosen') }}";
                }
            });
        }
    });
</script>

{% endblock %}
