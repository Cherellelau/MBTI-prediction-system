{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:600px;margin:0 auto;">
    <h1>Reset Password</h1>
    <p class="muted" style="margin-top:6px;">
        User: <b>{{ u.name }}</b> ({{ u.email }})
    </p>

    <form method="POST" style="margin-top:14px;">
        <label style="display:block;margin-top:10px;">New Password (6–8 chars)</label>
        <input type="password" name="new_password" required
            style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;">

        <label style="display:block;margin-top:10px;">Confirm Password</label>
        <input type="password" name="confirm_password" required
            style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;">

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
            <button class="btn" type="submit">Update Password</button>
            <a class="btn secondary" href="{{ url_for('admin.admin_users_list') }}">Back</a>
        </div>
    </form>
</div>
{% endblock %}
