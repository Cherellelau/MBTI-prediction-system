{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width: 920px; margin: 24px auto; text-align:center;">
    <h1>{{ t("profile_manual_title") }}</h1>
    <p style="color:#6b7280; margin-bottom:24px;">
        {{ t("profile_onboarding_subtitle") }}
    </p>

    <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:16px;">
        <a href="{{ url_for('profile.profile_manual') }}" class="btn btn-primary"
            style="display:block; text-decoration:none; padding:18px;">
            {{ t("profile_onboarding_manual") }}
        </a>

        <a href="{{ url_for('profile.upload_resume_page') }}" class="btn btn-ghost"
            style="display:block; text-decoration:none; padding:18px;">
            {{ t("profile_onboarding_resume") }}
        </a>

        <a href="{{ url_for('profile.capture_resume_page') }}" class="btn btn-ghost"
            style="display:block; text-decoration:none; padding:18px;">
            {{ t("profile_onboarding_camera") }}
        </a>
    </div>
</div>

{% endblock %}
