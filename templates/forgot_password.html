{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:520px;margin:0 auto;">
    <h1>{{ t('forgot_password_title') }}</h1>
    <p class="muted">{{ t('forgot_password_subtitle') }}</p>

    <form method="POST">
        <label>{{ t('email') }}</label>
        <input type="email" name="email" required placeholder="{{ t('forgot_password_email_ph') }}">

        <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
            <button type="submit" class="btn">{{ t('forgot_password_btn') }}</button>
            <a class="btn ghost" href="{{ url_for('auth.login') }}">{{ t('back_to_login') }}</a>
        </div>
    </form>
</div>

{% endblock %}
